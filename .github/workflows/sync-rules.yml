name: Sync Aegis Rules

on:
  schedule:
    - cron: "0 0 */1 * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Run
        run: |
          # 1. 增量同步到 rule 目录
          git clone --depth=1 https://github.com/Thoseyearsbrian/Aegis tmp
          mkdir -p rule
          rsync -avu tmp/rules/ rule/
          rm -rf tmp

          # 2. 强力清洗：砍掉注释 -> 补全掩码 -> 清理空格与空行
          find rule -type f \( -name "*.list" -o -name "*.txt" \) | while read -r f; do
            sed -i -E 's/#.*//; s/(IP-CIDR,[0-9]{1,3}(\.[0-9]{1,3}){3})([,[:space:]]|$)/\1\/32\3/g; s/\/32\/32/\/32/g; s/[[:space:]]+$//; /^[[:space:]]*$/d' "$f"
          done

          # 3. 提交变更
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || (git commit -m "sync: clean rule" && git push)
